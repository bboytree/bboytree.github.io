<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BNS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">

  <link rel="icon" href="/favicon/favicon.ico">
  <link rel="icon" type="image/png" sizes="96x96" href="/favicon/favicon-96x96.png">
  <link rel="apple-touch-icon" href="/favicon/apple-touch-icon.png">
</head>

<body>

  <nav class="navbar">
    <a href="index.html">About</a>
    <a href="photos.html"><strong>Photos</strong></a>
  </nav>

  <div class="container">

    <h1 class="page-title">Photos</h1>

    <div class="intro">
      <p class="photosintro">
         All photos were shot on a Nikon D60 camera from 2008. I preferred using it over my phone as it was less distracting.
      </p>
    </div>

<div class="gallery" id="gallery"></div>

<div class="pagination" id="pagination"></div>
  </div><!-- .container -->


<script>
const photos = [
  { src: "photos/post_lunch.JPG", title: "Post-lunch", link: "photos/post_lunch.html" },
  { src: "photos/ethernal.JPG", title: "Ethernal", link: "photos/ethernal.html" },
  { src: "photos/rising_sun.JPG", title: "Rising Sun", link: "photos/rising_sun.html" },
  { src: "photos/lines_and_shapes.jpg", title: "Lines and Shapes", link: "photos/lines_and_shapes.html" },
  { src: "photos/goodnight.JPG", title: "Goodnight", link: "photos/goodnight.html" },
  { src: "photos/goodnight.JPG", title: "Goodnight", link: "photos/goodnight.html" },
  { src: "photos/goodnight.JPG", title: "Goodnight", link: "photos/goodnight.html" },
    { src: "photos/goodnight.JPG", title: "Goodnight", link: "photos/goodnight.html" },
  { src: "photos/goodnight.JPG", title: "Goodnight", link: "photos/goodnight.html" },
  { src: "photos/goodnight.JPG", title: "Goodnight", link: "photos/goodnight.html" },
    { src: "photos/goodnight.JPG", title: "Goodnight", link: "photos/goodnight.html" },
  { src: "photos/goodnight.JPG", title: "Goodnight", link: "photos/goodnight.html" },
  { src: "photos/goodnight.JPG", title: "Goodnight", link: "photos/goodnight.html" },

  // 👉 Add new photos here
];

const perPage = 6;

// Get page from URL
const params = new URLSearchParams(window.location.search);
const currentPage = parseInt(params.get("page")) || 1;

const start = (currentPage - 1) * perPage;
const end = start + perPage;

const pagePhotos = photos.slice(start, end);

const gallery = document.getElementById("gallery");

// Render photos
pagePhotos.forEach(photo => {
  const figure = document.createElement("figure");

  figure.innerHTML = `
    <a href="${photo.link}">
      <img src="${photo.src}" alt="${photo.title}">
      <figcaption>${photo.title}</figcaption>
    </a>
  `;

  gallery.appendChild(figure);
});

// Pagination logic
const totalPages = Math.ceil(photos.length / perPage);
const pagination = document.getElementById("pagination");

pagination.innerHTML = `
  <div class="page-left">
    ${currentPage > 1 ? `<a href="?page=${currentPage - 1}">TURN BACK</a>` : ``}
  </div>

<div class="page-center">
  <div class="page-line"></div>
  <span>PAGE ${currentPage}</span>
  <div class="page-line"></div>
</div>

  <div class="page-right">
    ${currentPage < totalPages ? `<a href="?page=${currentPage + 1}">TURN PAGE</a>` : ``}
  </div>
`;

// Fade-in effect (your original logic)
document.querySelectorAll('.gallery img').forEach(img => {
  if (img.complete) {
    img.classList.add('loaded');
  } else {
    img.onload = () => img.classList.add('loaded');
  }
});
</script>

</body>
</html>
